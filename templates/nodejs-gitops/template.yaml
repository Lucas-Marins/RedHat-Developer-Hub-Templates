apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: nodejs-gitops-app
  title: Node.js App com GitOps (ArgoCD)
  description: >
    Cria uma aplicação Node.js (Express) com GitHub Actions para build de Docker
    (Docker Hub) e um repositório separado para manifests GitOps (ArgoCD).
  tags:
    - nodejs
    - express
    - docker
    - dockerhub
    - github-actions
    - gitops
    - argocd
    - openshift
spec:
  owner: platform-team
  type: service

  parameters:
    - title: Informações da Aplicação
      required:
        - appName
        - description
        - owner
      properties:
        appName:
          title: Nome da Aplicação
          type: string
          description: Nome único em kebab-case (será usado como nome dos repositórios)
          pattern: '^[a-z0-9]+(-[a-z0-9]+)*$'
          ui:autofocus: true
          ui:options:
            rows: 1

        description:
          title: Descrição
          type: string
          description: Breve descrição do que a aplicação faz

        owner:
          title: Time Responsável
          type: string
          ui:field: OwnerPicker
          ui:options:
            allowedKinds:
              - Group

    - title: Configurações OpenShift
      required:
        - namespace
        - environment
      properties:
        namespace:
          title: Namespace OpenShift
          type: string
          description: Namespace onde o app será deployado
          default: nodejs-apps

        environment:
          title: Ambiente Inicial
          type: string
          default: dev
          enum:
            - dev
            - hml
            - prd
          enumNames:
            - Desenvolvimento
            - Homologação
            - Produção

        replicas:
          title: Número de Réplicas
          type: number
          default: 1
          minimum: 1
          maximum: 5

    - title: Configurações GitHub e Docker Hub
      required:
        - githubOrg
        - dockerHubUsername
        - dockerHubToken
      properties:
        githubOrg:
          title: Organização do GitHub
          type: string
          description: Organização ou usuário do GitHub onde os repositórios serão criados
          default: Lucas-Marins
          

        dockerHubUsername:
          title: Usuário do Docker Hub
          type: string
          description: Nome de usuário no Docker Hub para publicar as imagens

        dockerHubToken:
          title: Token de Acesso do Docker Hub
          type: string
          description: Token de acesso pessoal do Docker Hub (não a senha!)
          ui:field: Secret

        repoVisibility:
          title: Visibilidade dos Repositórios
          type: string
          default: private
          enum:
            - public
            - private
          enumNames:
            - Público
            - Privado

  steps:
    # ========== PASSO 1: Gerar código da aplicação ==========
    - id: fetch-app
      name: Gerar Código da Aplicação
      action: fetch:template
      input:
        url: ./skeleton
        values:
          appName: ${{ parameters.appName }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          namespace: ${{ parameters.namespace }}
          environment: ${{ parameters.environment }}
          replicas: ${{ parameters.replicas }}
          githubOrg: ${{ parameters.githubOrg }}
          dockerHubUsername: ${{ parameters.dockerHubUsername }}
          port: 3000

    # ========== PASSO 2: Criar secrets Docker Hub no repo da app ==========
    - id: create-secrets
      name: Criar Secrets Docker Hub
      action: github:actions:repo:createEnvironmentVariable
      input:
        repoUrl: "github.com?owner=${{ parameters.githubOrg }}&repo=${{ parameters.appName }}"
        secrets:
          - name: DOCKER_USERNAME
            value: ${{ parameters.dockerHubUsername }}
          - name: DOCKER_PASSWORD
            value: ${{ parameters.dockerHubToken }}

    # ========== PASSO 3: Remover pasta k8s do repo da app ==========
    - id: cleanup-app
      name: Limpar pasta k8s do repo da app
      action: fs:delete
      input:
        files:
          - ./k8s

    # ========== PASSO 4: Criar repo da aplicação ==========
    - id: publish-app
      name: Criar Repositório da Aplicação
      action: publish:github
      input:
        repoUrl: "github.com?owner=${{ parameters.githubOrg }}&repo=${{ parameters.appName }}"
        defaultBranch: main
        repoVisibility: ${{ parameters.repoVisibility }}
        sourcePath: ./

    # ========== PASSO 5: Criar repo GitOps com manifests ==========
    - id: publish-gitops
      name: Criar Repositório GitOps
      action: publish:github
      input:
        repoUrl: "github.com?owner=${{ parameters.githubOrg }}&repo=${{ parameters.appName }}-gitops"
        defaultBranch: main
        repoVisibility: ${{ parameters.repoVisibility }}
        sourcePath: ./k8s

    # ========== PASSO 6: Registrar app no catálogo ==========
    - id: register
      name: Registrar no Catálogo
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish-app'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

    # ========== PASSO 7: Criar Application no ArgoCD via API ==========
    - id: create-argocd
      name: Criar Aplicação no ArgoCD
      action: http:backstage:request
      input:
        method: POST
        path: /api/argocd/applications
        headers:
          Content-Type: application/json
        body: |
          {
            "apiVersion": "argoproj.io/v1alpha1",
            "kind": "Application",
            "metadata": {
              "name": "${{ parameters.appName }}-${{ parameters.environment }}",
              "namespace": "openshift-gitops"
            },
            "spec": {
              "project": "default",
              "source": {
                "repoURL": "${{ steps['publish-gitops'].output.remoteUrl }}",
                "path": "overlays/${{ parameters.environment }}",
                "targetRevision": "HEAD"
              },
              "destination": {
                "server": "https://kubernetes.default.svc",
                "namespace": "${{ parameters.namespace }}"
              },
              "syncPolicy": {
                "automated": {
                  "prune": true,
                  "selfHeal": true
                },
                "syncOptions": ["CreateNamespace=true"]
              }
            }
          }

  output:
    links:
      - title: Repositório da Aplicação
        url: ${{ steps['publish-app'].output.remoteUrl }}
        icon: github
      - title: Repositório GitOps
        url: ${{ steps['publish-gitops'].output.remoteUrl }}
        icon: cloud
      - title: Ver no Catálogo
        url: ${{ steps['publish-app'].output.catalogInfoUrl }}
        icon: catalog
      - title: Aplicação no ArgoCD
        url: https://openshift-gitops-server-openshift-gitops.apps.cluster-xv7kd.dynamic.redhatworkshops.io/applications/${{ parameters.appName }}-${{ parameters.environment }}
        icon: catalog
    text:
      - title: Próximos Passos
        content: |
          ✅ Repositório da aplicação criado: `${{ parameters.githubOrg }}/${{ parameters.appName }}`
          ✅ Repositório GitOps criado: `${{ parameters.githubOrg }}/${{ parameters.appName }}-gitops`
          ✅ Secrets DOCKER_USERNAME e DOCKER_PASSWORD criados automaticamente
          ✅ Aplicação registrada no catálogo
          ✅ Aplicação ArgoCD criada

          **Para fazer o primeiro deploy:**
          1. Clone o repo: `git clone ${{ steps['publish-app'].output.remoteUrl }}`
          2. Faça push para a branch `main`
          3. A GitHub Action vai buildar a imagem Docker e publicar no Docker Hub
          4. O ArgoCD vai sincronizar automaticamente
