apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: nodejs-gitops-app
  title: Node.js App com GitOps (ArgoCD)
  description: >
    Cria uma aplicação Node.js (Express) com GitHub Actions para build de Docker
    (Docker Hub) e um repositório separado para manifests GitOps (ArgoCD).
  tags:
    - nodejs
    - express
    - docker
    - dockerhub
    - github-actions
    - gitops
    - argocd
    - openshift
spec:
  owner: platform-team
  type: service

  parameters:
    - title: Informações da Aplicação
      required:
        - appName
        # - description
        # - owner
      properties:
        appName:
          title: Nome da Aplicação
          type: string
          description: Nome único em kebab-case (será usado como nome dos repositórios)
          pattern: '^[a-z0-9]+(-[a-z0-9]+)*$'
          ui:autofocus: true
          ui:options:
            rows: 1

        # description:
        #   title: Descrição
        #   type: string
        #   description: Breve descrição do que a aplicação faz

        # owner:
        #   title: Time Responsável
        #   type: string
        #   ui:field: OwnerPicker
        #   ui:options:
        #     allowedKinds:
        #       - Group

    - title: Configurações OpenShift
      required:
        - namespace
        - environment
      properties:
        namespace:
          title: Namespace OpenShift
          type: string
          description: Namespace onde o app será deployado
          default: nodejs-apps

        environment:
          title: Ambiente Inicial
          type: string
          default: dev
          enum:
            - dev
            - hml
            - prd
          enumNames:
            - Desenvolvimento
            - Homologação
            - Produção

        replicas:
          title: Número de Réplicas
          type: number
          default: 1
          minimum: 1
          maximum: 5

    # ========== Docker Hub token removido: agora é secret de Org ==========
    - title: Configurações GitHub
      required:
        - githubOrg
      properties:
        githubOrg:
          title: Organização do GitHub
          type: string
          description: Organização onde os repositórios serão criados
          default: Org-LucasTSST

        dockerHubUsername:
          title: Usuário do Docker Hub
          type: string
          description: Usado para montar o path da imagem nos manifests (não é secret)
          default: 123l

        repoVisibility:
          title: Visibilidade dos Repositórios
          type: string
          description: Free plan só libera org-secret pra repo público
          default: public
          enum:
            - public
            - private
          enumNames:
            - Público
            - Privado

  steps:
    # ========== PASSO 1: Gerar código da aplicação ==========
    - id: fetch-app
      name: Gerar Código da Aplicação
      action: fetch:template
      input:
        url: ./skeleton
        values:
          appName: ${{ parameters.appName }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          namespace: ${{ parameters.namespace }}
          environment: ${{ parameters.environment }}
          env: ${{ parameters.environment }} 
          replicas: ${{ parameters.replicas }}
          githubOrg: ${{ parameters.githubOrg }}
          dockerHubUsername: ${{ parameters.dockerHubUsername }}
          port: 3000

    # ========== PASSO 2: Criar repo GitOps PRIMEIRO (antes de deletar k8s) ==========
    - id: publish-gitops
      name: Criar Repositório GitOps
      action: publish:github
      input:
        repoUrl: "github.com?owner=${{ parameters.githubOrg }}&repo=${{ parameters.appName }}-gitops"
        defaultBranch: main
        repoVisibility: ${{ parameters.repoVisibility }}
        sourcePath: ./k8s

    # ========== PASSO 3: Remover pasta k8s do repo da app ==========
    - id: cleanup-app
      name: Limpar pasta k8s do repo da app
      action: fs:delete
      input:
        files:
          - ./k8s

    # ========== PASSO 4: Criar repo da aplicação ==========
    - id: publish-app
      name: Criar Repositório da Aplicação
      action: publish:github
      input:
        repoUrl: "github.com?owner=${{ parameters.githubOrg }}&repo=${{ parameters.appName }}"
        defaultBranch: main
        repoVisibility: ${{ parameters.repoVisibility }}
        sourcePath: ./

    # ========== PASSO 5: Registrar app no catálogo ==========
    - id: register
      name: Registrar no Catálogo
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish-app'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repositório da Aplicação
        url: ${{ steps['publish-app'].output.remoteUrl }}
        icon: github
      - title: Repositório GitOps
        url: ${{ steps['publish-gitops'].output.remoteUrl }}
        icon: cloud
      - title: Ver no Catálogo
        url: ${{ steps['publish-app'].output.catalogInfoUrl }}
        icon: catalog
      - title: Aplicação no ArgoCD
        url: https://openshift-gitops-server-openshift-gitops.apps.cluster-xv7kd.dynamic.redhatworkshops.io/applications/${{ parameters.appName }}-${{ parameters.environment }}
        icon: catalog
    text:
      - title: Crie a aplicação no ArgoCD manualmente
        content: |
          Os secrets do Docker Hub já estão configurados via Org-LucasTSST — nada a fazer aí.

          1. Acesse: https://openshift-gitops-server-openshift-gitops.apps.cluster-xv7kd.dynamic.redhatworkshops.io
          2. New App → Name: `${{ parameters.appName }}-${{ parameters.environment }}`
          3. Source: `${{ steps['publish-gitops'].output.remoteUrl }}`
          4. Path: `overlays/${{ parameters.environment }}`
          5. Destination: namespace `${{ parameters.namespace }}`
          6. Enable Auto-Sync

          Depois disso, qualquer push na branch `main` do repo da app já builda, publica no Docker Hub e o ArgoCD sincroniza sozinho.