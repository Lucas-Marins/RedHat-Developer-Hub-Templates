name: CI/CD - Build, Push e Deploy ArgoCD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_NAME: {% raw %}${{ github.event.repository.name }}{% endraw %}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: {% raw %}${{ secrets.DOCKER_USERNAME }}{% endraw %}
          password: {% raw %}${{ secrets.DOCKER_PASSWORD }}{% endraw %}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: {% raw %}${{ github.event_name != 'pull_request' }}{% endraw %}
          tags: |
            {% raw %}${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest{% endraw %}
            {% raw %}${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}{% endraw %}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image digest
        run: |
          {% raw %}echo "Image pushed to: ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"{% endraw %}

  deploy-argocd:
    runs-on: ubuntu-latest
    needs: build
    if: {% raw %}${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}{% endraw %}
    
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: {% raw %}${{ github.repository_owner }}/${{ github.event.repository.name }}-gitops{% endraw %}
          token: {% raw %}${{ secrets.GITHUB_TOKEN }}{% endraw %}

      - name: Install OpenShift CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: "4.15"

      - name: Apply ApplicationSet
        run: |
          oc login --token={% raw %}${{ secrets.OPENSHIFT_TOKEN }}{% endraw %} \
            --server=https://api.cluster-xv7kd.dynamic.redhatworkshops.io:6443 \
            --insecure-skip-tls-verify
          oc apply -f argocd/applicationset.yaml -n openshift-gitops
        env:
          OPENSHIFT_TOKEN: {% raw %}${{ secrets.OPENSHIFT_TOKEN }}{% endraw %}