apiVersion: v1
kind: Service
metadata:
  name: ${{ values.appName }}
  labels:
    app: ${{ values.appName }}
    app.kubernetes.io/name: ${{ values.appName }}
    app.kubernetes.io/part-of: ${{ values.appName }}
    backstage.io/kubernetes-id: ${{ values.appName }}   # <-- ADICIONAR AQUI
spec:
  selector:
    app.kubernetes.io/name: ${{ values.appName }}
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080