apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ${{ values.namespace }}

resources:
  - ../../base

namePrefix: dev-

images:
  - name: docker.io/${{ values.dockerHubUsername }}/${{ values.appName }}
    newTag: latest

replicas:
  - name: ${{ values.appName }}
    count: 1

patches:
  - target:
      kind: Route
      name: ${{ values.appName }}
    patch: |
      - op: replace
        path: /spec/to/name
        value: dev-${{ values.appName }}