apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{ values.appName }}
  description: ${{ values.description }}
  annotations:
    github.com/project-slug: ${{ values.githubOrg }}/${{ values.appName }}
    backstage.io/kubernetes-id: ${{ values.appName }}
    backstage.io/kubernetes-namespace: ${{ values.namespace }}
    argocd/app-name: ${{ values.appName }}-${{ values.environment }}
  tags:
    - nodejs
    - express
    - ${{ values.environment }}
    - gitops
spec:
  type: service
  lifecycle: ${{ values.environment == 'prd' and 'production' or 'experimental' }}
  owner: ${{ values.owner }}
  system: nodejs-apps