apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{ values.appName }}
  description: ${{ values.description }}
  namespace: ${{ values.namespace }}
  annotations:
    github.com/project-slug: ${{ values.githubOrg }}/${{ values.appName }}
    backstage.io/kubernetes-id: ${{ values.appName }}
    backstage.io/kubernetes-namespace: ${{ values.namespace }}
    backstage.io/techdocs-ref: dir:.
    argocd/app-name: ${{ values.appName }}-${{ values.environment }}
    argocd/instance-name: main
  tags:
    - nodejs
    - express
    - ${{ values.environment }}
    - gitops
spec:
  type: service
  lifecycle: experimental
  owner: ${{ values.owner }}
  system: ${{ values.appName }}-system
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: ${{ values.appName }}-system
  namespace: ${{ values.namespace }}
spec:
  owner: ${{ values.owner }}